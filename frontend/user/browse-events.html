<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Events - EventHub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-fade-in">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-calendar-alt"></i>
                <span>EventHub</span>
            </div>
            <div class="sidebar-user">
                Hello,
                <strong class="user-name">User</strong>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="my-events.html">
                <i class="fas fa-calendar-check"></i>
                <span>My Events</span>
            </a>
            <a href="upcoming-events.html">
                <i class="fas fa-clock"></i>
                <span>Upcoming Events</span>
            </a>
            <a href="browse-events.html" class="active">
                <i class="fas fa-search"></i>
                <span>Browse Events</span>
            </a>
            <a href="certificates.html">
                <i class="fas fa-award"></i>
                <span>Certificates</span>
            </a>
            <a href="#" class="logout" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <!-- Sidebar Backdrop (Mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" id="sidebar-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Back Button -->
        <button class="back-button" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <!-- Page Header -->
        <div class="page-header">
            <h1>Browse Events</h1>
            <p>Discover and join exciting events happening around you</p>
        </div>

        <!-- Search and Filter -->
        <div class="search-filter-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search for events..." onkeyup="handleSearch()">
            </div>
            
            <div class="filter-row">
                <select class="filter-select" id="category-filter" onchange="handleCategoryFilter()">
                    <option value="All">All Categories</option>
                    <option value="Conference">Conference</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Seminar">Seminar</option>
                    <option value="Party">Party</option>
                    <option value="Webinar">Webinar</option>
                    <option value="Exhibition">Exhibition</option>
                    <option value="Competition">Competition</option>
                </select>
            </div>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="events-container">
            <!-- Events will be loaded here by JavaScript -->
        </div>
    </main>

    <!-- JavaScript Files -->
    <script src="../js/auth.js"></script>
    <script src="../js/events.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Check authentication
        checkAuth();
        
        // Display user name
        displayUserName();
        
        // Load all events initially
        let currentEvents = getAllEvents();
        renderEventCards(currentEvents, 'events-container');
        
        // Handle search
        function handleSearch() {
            const query = document.getElementById('search-input').value;
            const category = document.getElementById('category-filter').value;
            
            let filtered = searchEvents(query);
            
            if (category !== 'All') {
                filtered = filtered.filter(event => event.category === category);
            }
            
            currentEvents = filtered;
            renderEventCards(currentEvents, 'events-container');
        }
        
        // Handle category filter
        function handleCategoryFilter() {
            const category = document.getElementById('category-filter').value;
            const query = document.getElementById('search-input').value;
            
            let filtered = filterEventsByCategory(category);
            
            if (query) {
                filtered = filtered.filter(event => 
                    event.name.toLowerCase().includes(query.toLowerCase()) ||
                    event.description.toLowerCase().includes(query.toLowerCase())
                );
            }
            
            currentEvents = filtered;
            renderEventCards(currentEvents, 'events-container');
        }
    </script>
</body>
</html>
