<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events - EventHub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-fade-in">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-calendar-alt"></i>
                <span>EventHub</span>
            </div>
            <div class="sidebar-user">
                Hello,
                <strong class="user-name">User</strong>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="my-events.html">
                <i class="fas fa-calendar-check"></i>
                <span>My Events</span>
            </a>
            <a href="upcoming-events.html" class="active">
                <i class="fas fa-clock"></i>
                <span>Upcoming Events</span>
            </a>
            <a href="browse-events.html">
                <i class="fas fa-search"></i>
                <span>Browse Events</span>
            </a>
            <a href="certificates.html">
                <i class="fas fa-award"></i>
                <span>Certificates</span>
            </a>
            <a href="#" class="logout" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <!-- Sidebar Backdrop (Mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="sidebar-toggle" id="sidebar-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Back Button -->
        <button class="back-button" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <!-- Page Header -->
        <div class="page-header-dashboard">
            <h1>Upcoming Events</h1>
            <p>Don't miss out on these exciting upcoming events</p>
        </div>

        <!-- Events List -->
        <div class="upcoming-events-list" id="upcoming-events-container">
            <!-- Events will be loaded here by JavaScript -->
        </div>
    </main>

    <!-- JavaScript Files -->
    <script src="../js/auth.js"></script>
    <script src="../js/events.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Check authentication
        checkAuth();
        
        // Display user name
        displayUserName();
        
        // Load upcoming events (events happening soon)
        const upcomingEvents = getAllEvents().slice(0, 5);
        renderUpcomingEventsList(upcomingEvents, 'upcoming-events-container');
        
        // Function to render upcoming events as a list
        function renderUpcomingEventsList(events, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = '<p class="no-events">No upcoming events found</p>';
                return;
            }
            
            events.forEach(event => {
                const listItem = document.createElement('div');
                listItem.className = 'upcoming-event-item';
                
                listItem.innerHTML = `
                    <div class="upcoming-event-date">
                        <span class="date-day">${new Date(event.date).getDate()}</span>
                        <span class="date-month">${new Date(event.date).toLocaleString('default', { month: 'short' }).toUpperCase()}</span>
                    </div>
                    <div class="upcoming-event-info">
                        <h3>${event.name}</h3>
                        <div class="event-meta">
                            <span><i class="fas fa-clock"></i> ${event.time}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
                            <span class="event-badge badge-${event.category.toLowerCase()}">${event.category}</span>
                        </div>
                    </div>
                    <div class="upcoming-event-action">
                        <button class="btn btn-primary" onclick="viewEventDetail(${event.id})">
                            View Details
                        </button>
                    </div>
                `;
                
                container.appendChild(listItem);
            });
        }
    </script>
</body>
</html>
