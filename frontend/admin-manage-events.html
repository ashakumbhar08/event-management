<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Admin - EventHub</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Admin Stylesheets -->
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/admin-sidebar.css">
</head>
<body class="page-fade-in">
    <div class="admin-layout">
        <!-- Admin Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-sidebar-logo">
                    <i class="fas fa-calendar-alt"></i>
                    <span>EventHub</span>
                </div>
                <div class="admin-sidebar-user">
                    Welcome,
                    <strong class="admin-name">Admin</strong>
                </div>
            </div>
            
            <nav class="admin-sidebar-nav">
                <a href="admin-dashboard.html">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admin-create-event.html">
                    <i class="fas fa-plus-circle"></i>
                    <span>Create Event</span>
                </a>
                <a href="admin-manage-events.html" class="active">
                    <i class="fas fa-calendar-edit"></i>
                    <span>Manage Events</span>
                </a>
                <a href="admin-analytics.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
                <a href="admin-users.html">
                    <i class="fas fa-users"></i>
                    <span>Users / Participants</span>
                </a>
                <a href="#" class="logout" onclick="handleAdminLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Sidebar Backdrop (Mobile) -->
        <div class="admin-sidebar-backdrop" id="admin-sidebar-backdrop"></div>

        <!-- Sidebar Toggle Button (Mobile) -->
        <button class="admin-sidebar-toggle" id="admin-sidebar-toggle">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Main Content -->
        <main class="admin-main-content">
            <!-- Back Button -->
            <button class="admin-back-button" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Back
            </button>

            <!-- Page Header -->
            <div class="admin-page-header">
                <h1>Manage Events</h1>
                <p>View, edit, and delete all your events</p>
            </div>

            <!-- Search Bar -->
            <div class="admin-search-container">
                <div class="admin-search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search events by name..." onkeyup="handleSearchEvents()">
                </div>
            </div>

            <!-- Events Container -->
            <div class="admin-events-grid" id="events-container">
                <!-- Events will be loaded here by JavaScript -->
            </div>

            <!-- Empty State -->
            <div class="admin-empty-state" id="empty-state" style="display: none;">
                <i class="fas fa-calendar-times"></i>
                <h3>No events found</h3>
                <p>Create your first event to get started</p>
                <a href="admin-create-event.html" class="btn btn-admin-primary">
                    <i class="fas fa-plus-circle"></i> Create Event
                </a>
            </div>
        </main>
    </div>

    <!-- JavaScript Files -->
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-sidebar.js"></script>
    <script src="js/admin-events.js"></script>
    <script src="js/admin-manage.js"></script>
    <script>
        // Check admin authentication
        checkAdminAuth();
        
        // Display admin name
        displayAdminName();
        
        // Load all events
        loadManageEvents();
    </script>
</body>
</html>
